<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Voice Orb</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  display:grid;
  place-items:center;
  overflow:hidden;
}

canvas{
  width:min(420px,80vw);
  height:min(420px,80vw);
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let size = 500;
canvas.width = size;
canvas.height = size;

let analyser, dataArray;
let smoothVolume = 0;
let started = false;

async function init(){
  if(started) return;
  started = true;

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;

  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

canvas.addEventListener("click", init);
canvas.addEventListener("touchstart", init);

function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,size,size);

  const cx = size/2;
  const cy = size/2;

  let volume = 0;

  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for(let i=0;i<dataArray.length;i++){
      sum += dataArray[i];
    }
    volume = sum / dataArray.length / 255;
  }

  // сглаживание чтобы не дёргалось
  smoothVolume += (volume - smoothVolume) * 0.08;

  const baseRadius = 135;
  const dynamicRadius = baseRadius + smoothVolume * 50;

  ctx.save();
  ctx.translate(cx,cy);

  // OUTER GLOW
  ctx.shadowColor = "white";
  ctx.shadowBlur = 40 + smoothVolume*60;

  // Градиент для “ядра” линии
  const grad = ctx.createRadialGradient(
    0,0,dynamicRadius*0.8,
    0,0,dynamicRadius*1.2
  );
  grad.addColorStop(0,"rgba(255,255,255,0.15)");
  grad.addColorStop(1,"rgba(255,255,255,0.9)");

  ctx.strokeStyle = grad;
  ctx.lineWidth = 4.5;

  ctx.beginPath();

  const points = 120;
  for(let i=0;i<=points;i++){
    const angle = (i/points)*Math.PI*2;

    // очень мягкая неровность
    const subtleNoise =
      Math.sin(angle*2 + performance.now()*0.0015)*3 +
      Math.sin(angle*5 + performance.now()*0.0008)*2;

    const r = dynamicRadius + subtleNoise * (0.4 + smoothVolume*0.8);

    const x = Math.cos(angle)*r;
    const y = Math.sin(angle)*r;

    if(i===0){
      ctx.moveTo(x,y);
    } else {
      ctx.lineTo(x,y);
    }
  }

  ctx.closePath();
  ctx.stroke();

  // внутренняя мягкая аура
  const innerGlow = ctx.createRadialGradient(
    0,0,0,
    0,0,dynamicRadius*1.5
  );
  innerGlow.addColorStop(0,"rgba(255,255,255,0.05)");
  innerGlow.addColorStop(1,"rgba(255,255,255,0)");

  ctx.fillStyle = innerGlow;
  ctx.beginPath();
  ctx.arc(0,0,dynamicRadius*1.4,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

draw();
</script>
</body>
</html>

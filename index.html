<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Audio Orb</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  display:grid;
  place-items:center;
}

canvas{
  width:min(420px,80vw);
  height:min(420px,80vw);
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let size = 500;
canvas.width = size;
canvas.height = size;

let audioCtx, analyser, dataArray;
let started = false;

async function initAudio(){
  if(started) return;
  started = true;

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;

  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

canvas.addEventListener("click", initAudio);
canvas.addEventListener("touchstart", initAudio);

function draw(){
  requestAnimationFrame(draw);

  ctx.clearRect(0,0,size,size);

  let cx = size/2;
  let cy = size/2;
  let baseRadius = 130;

  let volume = 0;

  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for(let i=0;i<dataArray.length;i++){
      sum += dataArray[i];
    }
    volume = sum / dataArray.length / 255;
  }

  let dynamicRadius = baseRadius + volume * 60;

  ctx.save();
  ctx.translate(cx,cy);

  ctx.shadowColor = "white";
  ctx.shadowBlur = 30 + volume*40;

  ctx.lineWidth = 6;
  ctx.strokeStyle = "white";
  ctx.globalAlpha = 0.9;

  ctx.beginPath();

  let points = 160;
  for(let i=0;i<=points;i++){
    let angle = (i/points)*Math.PI*2;

    let noise =
      Math.sin(angle*3 + performance.now()*0.002) * 6 +
      Math.sin(angle*7 + performance.now()*0.0015) * 4;

    let r = dynamicRadius + noise * (0.3 + volume*1.8);

    let x = Math.cos(angle) * r;
    let y = Math.sin(angle) * r;

    if(i===0){
      ctx.moveTo(x,y);
    }else{
      ctx.lineTo(x,y);
    }
  }

  ctx.closePath();
  ctx.stroke();

  // внутренняя мягкая аура
  let grad = ctx.createRadialGradient(0,0, dynamicRadius*0.5, 0,0, dynamicRadius*1.4);
  grad.addColorStop(0,"rgba(255,255,255,0.05)");
  grad.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0,0,dynamicRadius*1.3,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

draw();
</script>
</body>
</html>
